<!DOCTYPE html>
<html lang="ja">
<head>
<style>
#loader{position:fixed;inset:0;background:#0A0A0A;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity 0.4s ease;}
#loader.hide{opacity:0;pointer-events:none;}
.loader-logo{font-family:sans-serif;font-size:22px;letter-spacing:10px;color:#FF6B00;opacity:0;animation:loaderFadeIn 0.3s ease forwards 0.05s;}
.loader-bar-wrap{width:160px;height:1px;background:rgba(255,107,0,0.15);overflow:hidden;}
.loader-bar{height:100%;width:0;background:#FF6B00;animation:loaderBar 0.5s ease forwards 0.1s;}
@keyframes loaderFadeIn{to{opacity:1;}}
@keyframes loaderBar{to{width:100%;}}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVEL | Light's Sign! -FARMANIAN-</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Orbitron:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --orange:  #FF6B00;
  --dark:    #0A0A0A;
  --dark2:   #111111;
  --dark3:   #1A1A1A;
  --card:    #161616;
  --border:  rgba(255,107,0,0.25);
  --white:   #F0EBE3;
  --gray:    #777;
  --gray2:   #333;
  --nav-h:   64px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--white);font-family:'Zen Kaku Gothic New',sans-serif;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}

/* NAV */
nav.main-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
.nav-logo span{color:var(--orange);}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--gray);text-transform:uppercase;transition:color 0.2s;position:relative;padding-bottom:4px;}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--orange);transition:width 0.3s;}
.nav-links a:hover{color:var(--white);}
.nav-links a:hover::after{width:100%;}
.nav-links a.active{color:var(--orange);}
.nav-links a.active::after{width:100%;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none;}
.hamburger span{display:block;width:24px;height:2px;background:var(--white);transition:transform 0.3s,opacity 0.3s;transform-origin:center;}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.nav-drawer{display:none;position:fixed;top:0;right:-100%;width:min(320px,80vw);height:100vh;background:var(--dark2);border-left:1px solid var(--border);z-index:999;padding:calc(var(--nav-h) + 40px) 40px 40px;transition:right 0.4s cubic-bezier(0.4,0,0.2,1);flex-direction:column;}
.nav-drawer.open{right:0;}
.nav-drawer ul{list-style:none;display:flex;flex-direction:column;}
.nav-drawer ul li{border-bottom:1px solid rgba(255,255,255,0.05);}
.nav-drawer ul a{display:block;padding:18px 0;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:var(--gray);text-transform:uppercase;transition:color 0.2s,padding-left 0.2s;}
.nav-drawer ul a:hover{color:var(--orange);padding-left:8px;}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:998;}
.drawer-overlay.open{display:block;}

/* PAGE HERO */
.page-hero{position:relative;padding:calc(var(--nav-h) + 60px) 32px 50px;text-align:center;overflow:hidden;}
.page-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,107,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,0,0.03) 1px,transparent 1px);background-size:60px 60px;}
.hero-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:280px;background:radial-gradient(ellipse,rgba(255,107,0,0.1) 0%,transparent 70%);pointer-events:none;}
.page-eyebrow{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:6px;color:var(--orange);margin-bottom:14px;opacity:0;animation:fadeUp 0.6s ease forwards 0.3s;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,10vw,108px);letter-spacing:8px;line-height:1;opacity:0;animation:fadeUp 0.8s ease forwards 0.5s;}
.page-title span{color:var(--orange);}

/* CONTAINER */
.container{max-width:1000px;margin:0 auto;padding:0 32px;}

/* TABS */
.tab-wrap{display:flex;gap:2px;margin:40px 0 40px;position:relative;z-index:2;}
.tab-btn{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:var(--gray);border:1px solid var(--gray2);background:none;padding:14px 36px;cursor:pointer;text-transform:uppercase;transition:color 0.2s,border-color 0.2s,background 0.2s;}
.tab-btn:hover{color:var(--white);border-color:var(--gray);}
.tab-btn.active{color:var(--dark);background:var(--orange);border-color:var(--orange);}

/* NOVEL GRID */
.novel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;min-height:400px;}

.novel-card{background:var(--card);border:1px solid rgba(255,255,255,0.04);overflow:hidden;cursor:pointer;transition:border-color 0.3s,transform 0.3s;display:flex;flex-direction:column;}
.novel-card:hover{border-color:var(--border);transform:translateY(-4px);}
.novel-card a{display:flex;flex-direction:column;height:100%;}

/* サムネ */
.novel-thumb{width:100%;aspect-ratio:16/9;background:var(--dark3);position:relative;overflow:hidden;flex-shrink:0;}
.novel-thumb img{width:100%;height:100%;object-fit:cover;opacity:0.8;transition:opacity 0.3s,transform 0.3s;}
.novel-card:hover .novel-thumb img{opacity:1;transform:scale(1.03);}
.thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--gray2);}
.thumb-placeholder .t-icon{font-size:28px;opacity:0.25;}
.thumb-placeholder p{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;opacity:0.2;}
.novel-num-badge{position:absolute;top:10px;left:10px;background:var(--orange);color:var(--dark);font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 10px;}
.novel-new-badge{position:absolute;top:10px;right:10px;background:#E74C3C;color:white;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;padding:3px 8px;}

/* カード本文 */
.novel-body{padding:20px 20px 20px;flex:1;display:flex;flex-direction:column;gap:8px;}
.novel-date{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:var(--gray);}
.novel-title{font-size:15px;font-weight:900;line-height:1.4;color:var(--white);transition:color 0.2s;}
.novel-card:hover .novel-title{color:var(--orange);}
.novel-excerpt{font-size:11px;line-height:1.8;color:rgba(240,235,227,0.45);flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.novel-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);}
.novel-chars{display:flex;gap:4px;flex-wrap:wrap;}
.novel-char-tag{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:1px;padding:2px 7px;background:rgba(255,107,0,0.08);border:1px solid rgba(255,107,0,0.2);color:rgba(255,140,42,0.7);}
.novel-arrow{font-size:12px;color:var(--gray);transition:color 0.2s,transform 0.2s;}
.novel-card:hover .novel-arrow{color:var(--orange);transform:translateX(4px);}

/* PAGINATION */
.pagination{display:flex;justify-content:center;align-items:center;gap:4px;margin:48px 0 80px;}
.page-btn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid var(--gray2);background:none;color:var(--gray);cursor:pointer;transition:color 0.2s,border-color 0.2s,background 0.2s;}
.page-btn:hover{color:var(--white);border-color:var(--gray);}
.page-btn.active{color:var(--dark);background:var(--orange);border-color:var(--orange);}
.page-btn.arrow{width:auto;padding:0 16px;font-size:12px;}
.page-btn:disabled{opacity:0.2;cursor:default;}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--gray2);}
.empty-state .e-icon{font-size:48px;opacity:0.2;}
.empty-state p{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;opacity:0.3;}

/* FOOTER */
footer{border-top:1px solid rgba(255,255,255,0.05);padding:40px 32px;text-align:center;}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:6px;color:rgba(255,107,0,0.25);margin-bottom:16px;}
.footer-nav{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-bottom:24px;}
.footer-nav a{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:var(--gray2);text-transform:uppercase;transition:color 0.2s;}
.footer-nav a:hover{color:var(--orange);}
.footer-copy{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.15);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.4s ease forwards;}

@media(max-width:768px){
  .nav-links{display:none;}
  .hamburger{display:flex;}
  .nav-drawer{display:flex;}
  .novel-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:480px){
  nav.main-nav{padding:0 20px;}
  .container{padding:0 16px;}
  .novel-grid{grid-template-columns:1fr;}
  .tab-btn{padding:12px 20px;font-size:10px;}
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--orange);}
</style>
</head>
<body>

<div class="container">
  <!-- TABS -->
  <div class="tab-wrap">
    <button class="tab-btn active" onclick="switchTab('main')">本編</button>
    <button class="tab-btn" onclick="switchTab('short')">書き下ろし短編</button>
  </div>

  <!-- NOVEL GRID -->
  <div class="novel-grid" id="novelGrid"></div>

  </nav>

</footer>

<script>
// ---- ローディング ----
(function() {
  function hideLoader() {
    const l = document.getElementById('loader');
    if (!l) return;
    l.classList.add('hide');
    setTimeout(() => { if (l.parentNode) l.remove(); }, 400);
  }
  // loadイベントか、最大800msで強制消去
  window.addEventListener('load', hideLoader);
  setTimeout(hideLoader, 800);
})();
window.addEventListener("load",()=>{const l=document.getElementById("loader");setTimeout(()=>{l.classList.add("hide");setTimeout(()=>l.remove(),400);},550);});
/* =============================
   データ定義
   ↓↓ 新しい話をここに追加していく（新しいものを先頭に）
============================= */
const novels = {
  main: [
    {
      id: 1,
      num: '第1話',
      title: '光の向こうへ',
      date: '2026.04.22',
      excerpt: 'ブランクの向こうに広がる静寂。16歳の少年・光助は、初めてマイホールの扉を開いた。そこに待ち受けていたのは——',
      chars: ["上東光助", "ピンカー"],
      thumb: '',
      url: 'novels/novel_main_01.html',
      isNew: true,
    }
  
  ],
  short: [

  
  ],
};

/* ============================= */
const PER_PAGE = 9;
let currentTab = 'main';
let currentPage = 1;

function switchTab(tab) {
  currentTab = tab;
  currentPage = 1;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'main') || (i === 1 && tab === 'short'));
  });
  render();
}

function render() {
  const data = novels[currentTab];
  const grid = document.getElementById('novelGrid');
  const paginationEl = document.getElementById('pagination');

  const totalPages = Math.max(1, Math.ceil(data.length / PER_PAGE));
  const start = (currentPage - 1) * PER_PAGE;
  const items = data.slice(start, start + PER_PAGE);

  grid.classList.remove('fade-in');
  void grid.offsetWidth;
  grid.classList.add('fade-in');

  if (items.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="e-icon">📖</div>
        <p>COMING SOON...</p>
      </div>`;
    paginationEl.innerHTML = '';
    return;
  }

  grid.innerHTML = items.map(n => `
    <div class="novel-card">
      <a href="${n.url}">
        <div class="novel-thumb">
          ${n.thumb
            ? `<img src="${n.thumb}" alt="${n.title}">`
            : `<div class="thumb-placeholder">
                <div class="t-icon">📖</div>
                <p>NOVEL THUMBNAIL</p>
              </div>`
          }
          <div class="novel-num-badge">${n.num}</div>
          ${n.isNew ? '<div class="novel-new-badge">NEW</div>' : ''}
        </div>
        <div class="novel-body">
          <div class="novel-date">${n.date}</div>
          <div class="novel-title">${n.title}</div>
          <div class="novel-excerpt">${n.excerpt}</div>
          <div class="novel-footer">
            <div class="novel-chars">
              ${n.chars.map(c => `<span class="novel-char-tag">${c}</span>`).join('')}
            </div>
            <span class="novel-arrow">→</span>
          </div>
        </div>
      </a>
    </div>
  `).join('');

  // ページネーション
  if (totalPages <= 1) {
    paginationEl.innerHTML = '';
    return;
  }

  let pages = '';
  pages += `<button class="page-btn arrow" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
  for (let i = 1; i <= totalPages; i++) {
    pages += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  pages += `<button class="page-btn arrow" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>→</button>`;
  paginationEl.innerHTML = pages;
}

function goPage(page) {
  const totalPages = Math.ceil(novels[currentTab].length / PER_PAGE);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  render();
  document.querySelector('.tab-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ---- ハンバーガー ----
const hamburger = document.getElementById('hamburger');
const navDrawer = document.getElementById('navDrawer');
const drawerOverlay = document.getElementById('drawerOverlay');
function openDrawer(){hamburger.classList.add('open');navDrawer.classList.add('open');drawerOverlay.classList.add('open');document.body.style.overflow='hidden';}
function closeDrawer(){hamburger.classList.remove('open');navDrawer.classList.remove('open');drawerOverlay.classList.remove('open');document.body.style.overflow='';}
hamburger.addEventListener('click',()=>{navDrawer.classList.contains('open')?closeDrawer():openDrawer();});
drawerOverlay.addEventListener('click',closeDrawer);

// 初期描画
render();
</script>
</body>
