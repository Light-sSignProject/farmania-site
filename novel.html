<!DOCTYPE html>
<html class="staticrypt-html">

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap');

            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid #2a2a2e;
            }

            .staticrypt-page {
                width: 380px;
                max-width: 92vw;
                padding: 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #141417;
                max-width: 380px;
                margin: 0 auto;
                padding: 48px 40px 40px;
                text-align: center;
                border: 1px solid #2a2a2e;
                border-top: 3px solid #4CAF50;
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), 0 0 80px rgba(255, 90, 0, 0.06);
            }

            .staticrypt-form::before {
                content: "LSP — FARMANIAN UNIVERSE";
                display: block;
                color: #4CAF50;
                font-family: "Oswald", "Arial Narrow", sans-serif;
                font-size: 10px;
                letter-spacing: 0.45em;
                margin-bottom: 14px;
                opacity: 0.85;
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box;
                font-size: 14px;
                color: #eaeaea;
                outline: 0;
                padding: 15px 42px 15px 15px;
                width: 100%;
                letter-spacing: 0.2em;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: #0c0c0e;
                width: 100%;
                border: 1px solid #2a2a2e;
                margin: 0 0 18px;
                box-sizing: border-box;
                transition: border-color 0.2s;
            }

            .staticrypt-password-container:focus-within {
                border-color: #4CAF50;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 45%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                filter: invert(1);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: #4CAF50;
                width: 100%;
                border: 0;
                padding: 15px;
                color: #0c0c0e;
                font-family: "Oswald", "Arial Narrow", sans-serif;
                font-size: 15px;
                font-weight: 600;
                letter-spacing: 0.35em;
                text-indent: 0.35em;
                cursor: pointer;
                transition: filter 0.15s, box-shadow 0.15s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: #4CAF50;
                filter: brightness(112%);
                box-shadow: 0 0 18px rgba(255, 90, 0, 0.35);
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 0;
                background:
                    radial-gradient(ellipse at 50% -10%, rgba(255, 90, 0, 0.08), transparent 55%),
                    linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                    #76B852;
                background-size: auto, 44px 44px, 44px 44px, auto;
                font-family: "Oswald", "Arial", sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-instructions {
                margin-top: -1em;
                margin-bottom: 1em;
            }

            .staticrypt-form p {
                color: #9a9aa0;
                font-size: 12px;
                letter-spacing: 0.12em;
            }

            .staticrypt-title {
                font-size: 1.7em !important;
                color: #f5f5f5 !important;
                font-family: "Oswald", "Arial Narrow", sans-serif;
                font-weight: 600;
                letter-spacing: 0.18em;
                margin-top: 0;
            }

            .staticrypt-title::after {
                content: "";
                display: block;
                width: 42px;
                height: 2px;
                background: #4CAF50;
                margin: 14px auto 0;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1.2em;
                color: #9a9aa0;
                font-size: 12px;
                letter-spacing: 0.1em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 1em;
                accent-color: #4CAF50;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #76B852;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid #4CAF50;
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
